<!DOCTYPE html>
<html lang="en">

<head>
  <script src="assets/js/theme-init.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing | Transparent Cloud, VPS &amp; Server Plans | ICSDC</title>
  <meta name="description"
    content="Simple, transparent pricing for GPU Servers, Dedicated Servers, VPS, Cloud Hosting, and Storage. No hidden fees. Scale as you grow with ICSDC.">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pricing.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
</head>

<body>

  <!-- PAGE LOADER -->
  <div id="page-loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p class="loader-text">Loading...</p>
    </div>
  </div>
  <div class="overlay" id="overlay"></div>

  <!-- DROPDOWN -->
  <div id="dropdown-wrap">
    <div id="dropdown">
      <div data-strapi-dd="sidebar" class="hidden" id="dd-sidebar"></div>
      <div data-strapi-dd="flatLeft" class="hidden" id="dd-flat-left">
        <div data-strapi-dd="flatIcon" class="dd-flat-icon"></div>
        <div>
          <h3 data-strapi-dd="flatTitle"></h3>
          <p data-strapi-dd="flatDesc"></p>
        </div>
      </div>
      <div id="dd-content">
        <div id="dd-top-bar">
          <div data-strapi-dd="panelTitle" class="hidden" id="dd-panel-title"></div>
          <button class="dd-close" onclick="closeDropdown()">&#10005;</button>
        </div>
        <div data-strapi-dd="grid" id="dd-grid"></div>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">
        <img data-strapi-mainLogo data-strapi="mainLogo" src="" alt="ICSDC logo" class="logo-icon">
      </a>
      <ul data-strapi-nav class="nav-links" id="nav-links"></ul>
      <button class="btn-login desktop-login-btn">Login</button>
      <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
      <ul data-strapi-nav-mobile class="mobile-nav-links" id="mobile-nav-links"></ul>
      <button class="btn-login mobile-login-btn">Login</button>
    </div>
  </nav>

  <!-- ══════════════════════════════════ HERO ══════════════════════════════════ -->
  <section class="pr-hero">
    <div class="pr-hero-inner">
      <span class="pr-eyebrow" data-pr="eyebrow"><span class="pr-eyebrow-dot"></span> <span
          data-pr="eyebrow-text"></span></span>
      <h1 class="pr-hero-title" data-pr="title"></h1>
      <p class="pr-hero-sub" data-pr="sub"></p>
      <div class="pr-hero-badges" id="pr-hero-badges"></div>
    </div>
  </section>

  <!-- ══════════════════════════════════ MOBILE TAB BAR ══════════════════════════════════ -->
  <div class="pr-mob-bar">
    <div class="pr-mob-bar-inner" id="pr-mob-tabs"></div>
  </div>

  <!-- ══════════════════════════════════ BODY: SIDEBAR + CONTENT ══════════════════════════════════ -->
  <div class="pr-body">

    <!-- ── SIDEBAR (wrap holds layout space; sidebar card moves with JS) ── -->
    <div class="pr-sidebar-wrap">
      <aside class="pr-sidebar" id="pr-sidebar-nav"></aside>
    </div><!-- /.pr-sidebar-wrap -->

    <!-- ── MAIN CONTENT ── -->
    <main class="pr-content" id="pr-content"></main>

  </div><!-- /.pr-body -->

  <!-- ══════════════════════════════════ CUSTOM QUOTE CTA ══════════════════════════════════ -->
  <section class="pr-cta-band" id="pr-cta-band">
    <div class="pr-cta-inner">
      <div>
        <div class="pr-cta-icon">🧮</div>
        <h2 data-pr="cta-title"></h2>
        <p data-pr="cta-desc"></p>
      </div>
      <div class="pr-cta-btns">
        <button class="pr-cta-primary" data-pr="cta-primary-btn"></button>
        <button class="pr-cta-outline" data-pr="cta-secondary-btn"></button>
      </div>
    </div>
  </section>

  <!-- ══════════════════════════════════ FOOTER ══════════════════════════════════ -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-main">
      <div data-strapi-link-groups class="footer-container">
        <div class="footer-brand">
          <a href="/" aria-label="ICSDC Home">
            <img data-strapi-logo src="" alt="ICSDC" width="117" class="footer-logo">
          </a>
          <address class="footer-address">
            <span data-strapi-footer-address></span>
            <span data-strapi-address class="footer-phone">Phone: +91 98109 58857</span>
            <span>Email: <a data-strapi-address href="mailto:info@icsdc.com"
                class="footer-email-link">info@icsdc.com</a></span>
          </address>
          <div class="footer-social" aria-label="Social media links">
            <a data-strapi-social="facebook" href="#" class="footer-social-link" aria-label="facebook" target="_blank"
              rel="noopener noreferrer">
              <i class="fa-solid fa-code" aria-hidden="true"></i>
            </a>
            <a data-strapi-social="twitter" href="#" class="footer-social-link" aria-label="twitter" target="_blank"
              rel="noopener noreferrer">
              <i class="fa-solid fa-code" aria-hidden="true"></i>
            </a>
            <a data-strapi-social="instagram" href="#" class="footer-social-link" aria-label="instagram" target="_blank"
              rel="noopener noreferrer">
              <i class="fa-solid fa-code" aria-hidden="true"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <p id="footer-year-text">&#169; Copyright <span data-strapi-year id="footer-year"></span> <span
          data-strapi-company-name></span>. All Rights Reserved</p>
    </div>
  </footer>

  <!-- SCROLL ANIMATION ENGINE -->
  <script>
    (function () {
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('[data-animate], [data-stagger]').forEach(function (el) {
        observer.observe(el);
      });
    })();
  </script>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js" type="module"></script>
  <script src="assets/js/pricing-cms.js" type="module"></script>
  <script src="assets/js/pricing.js" type="module"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/polish.js" defer></script>

</body>

</html>
